[pytest]
# Discover tests inside the tests/ directory only
testpaths = tests

# Minimum pytest version
minversion = 7.0

# Shorter output for passing tests; verbose on failures
addopts =
    -v
    --tb=short
    --strict-markers

# Prevent accidental imports of the real production config
filterwarnings =
    ignore::DeprecationWarning

# Custom markers (add more as needed)
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests that touch the filesystem
